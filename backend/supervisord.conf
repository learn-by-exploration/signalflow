[supervisord]
nodaemon=true
user=root

[program:migrate]
command=bash -c "if [ '%(ENV_ENVIRONMENT)s' = 'production' ] && [ -n '%(ENV_DATABASE_URL)s' ]; then echo 'Pre-migration backup...' && bash scripts/backup.sh 2>&1 || echo 'WARNING: Backup failed, proceeding with migration'; fi && timeout 120 alembic upgrade head && touch /tmp/.migrations_done"
autorestart=false
startsecs=0
priority=1
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:web]
command=bash -c "echo 'Waiting for migrations...' && for i in $(seq 1 60); do [ -f /tmp/.migrations_done ] && break; sleep 2; done && [ -f /tmp/.migrations_done ] && echo 'Migrations complete, starting web' && uvicorn app.main:app --host 0.0.0.0 --port %(ENV_PORT)s --workers 1 || (echo 'ERROR: Migrations did not complete within 120s' && exit 1)"
autorestart=true
priority=10
stopwaitsecs=30
stopsignal=TERM
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:celery-worker]
command=bash -c "for i in $(seq 1 60); do [ -f /tmp/.migrations_done ] && break; sleep 2; done && celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2"
autorestart=true
startretries=3
priority=10
stopwaitsecs=30
stopsignal=TERM
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:celery-beat]
command=bash -c "for i in $(seq 1 60); do [ -f /tmp/.migrations_done ] && break; sleep 2; done && celery -A app.tasks.celery_app beat --loglevel=info"
autorestart=true
startretries=3
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:telegram-bot]
command=bash -c "for i in $(seq 1 60); do [ -f /tmp/.migrations_done ] && break; sleep 2; done && python -m app.services.alerts.run_bot"
autorestart=true
startretries=5
priority=20
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
