# docker-compose.prod.yml — Production overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      bash -c "PYTHONPATH=/app alembic upgrade head &&
               exec uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000} --workers ${WEB_CONCURRENCY:-2}"
    environment:
      ENVIRONMENT: production
    restart: always

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      celery -A app.tasks.celery_app worker --beat --loglevel=info --concurrency=2
    environment:
      ENVIRONMENT: production
      PYTHONPATH: /app
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: ["node", "server.js"]
    restart: always

  db:
    restart: always

  redis:
    restart: always
