# docker-compose.prod.yml — Production overrides (Docker Compose deployments)
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# NOTE: Railway uses supervisord (see railway.toml + supervisord.conf) which runs
# web + celery-worker + celery-beat in a single container. This file is for
# standalone Docker Compose production deployments with separate containers.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      bash -c "PYTHONPATH=/app alembic upgrade head &&
               exec uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000} --workers ${WEB_CONCURRENCY:-2}"
    ports: []  # Fronted by reverse proxy in production
    user: appuser  # Non-root (Dockerfile creates this user)
    environment:
      ENVIRONMENT: production
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes: []  # No bind mounts in production
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      celery -A app.tasks.celery_app worker --beat --loglevel=info --concurrency=2
    user: appuser  # Non-root (Dockerfile creates this user)
    environment:
      ENVIRONMENT: production
      PYTHONPATH: /app
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes: []  # No bind mounts in production
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://backend:8000
    command: ["node", "server.js"]
    environment:
      NEXT_PUBLIC_SHOW_DEMO: "false"
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET required}
      BACKEND_URL: http://backend:8000
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M

  db:
    ports: []  # No external access in production
    restart: always

  redis:
    ports: []  # No external access in production
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required} --appendonly yes --appendfsync everysec --save ""
    restart: always
