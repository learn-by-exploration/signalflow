# docker-compose.prod.yml — Production overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      bash -c "PYTHONPATH=/app alembic upgrade head &&
               exec uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000} --workers ${WEB_CONCURRENCY:-2}"
    ports: []  # Fronted by reverse proxy in production
    user: appuser  # Override dev root user
    environment:
      ENVIRONMENT: production
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    restart: always

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      celery -A app.tasks.celery_app worker --beat --loglevel=info --concurrency=2
    user: appuser  # Override dev root user
    environment:
      ENVIRONMENT: production
      PYTHONPATH: /app
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: ["node", "server.js"]
    environment:
      NEXT_PUBLIC_SHOW_DEMO: "false"
    restart: always

  db:
    ports: []  # No external access in production
    restart: always

  redis:
    ports: []  # No external access in production
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme} --appendonly yes --appendfsync everysec --save ""
    restart: always
