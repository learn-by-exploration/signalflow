name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend — Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  backend:
    name: Backend — Lint, Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: signalflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check --line-length 100 .

      - name: Test
        run: python -m pytest tests/ -v --override-ini="asyncio_mode=auto"
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:testpass@localhost:5432/signalflow_test
          DATABASE_URL_SYNC: postgresql://postgres:testpass@localhost:5432/signalflow_test
          TEST_DATABASE_URL_SYNC: postgresql://postgres:testpass@localhost:5432/signalflow_test
          REDIS_URL: redis://localhost:6379/0
          ANTHROPIC_API_KEY: test-key
          ENVIRONMENT: test

  mkg:
    name: MKG — Lint, Test, Deployment Readiness
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: mkg/requirements.txt

      - name: Install MKG dependencies
        run: pip install -r mkg/requirements.txt

      - name: Install test dependencies
        run: pip install pytest pytest-asyncio

      - name: Test (all MKG tests including deployment readiness)
        run: python -m pytest mkg/tests/ -v --override-ini="asyncio_mode=auto"
        env:
          MKG_ENV: test
          PYTHONPATH: .

  docker-build:
    name: Docker — Build Verification
    runs-on: ubuntu-latest
    needs: [backend, frontend, mkg]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t signalflow-backend ./backend

      - name: Build frontend image
        run: docker build -t signalflow-frontend ./frontend
        env:
          DOCKER_BUILDKIT: 1

      - name: Build MKG image
        run: docker build -t signalflow-mkg -f mkg/Dockerfile .

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --detach --service backend

      - name: Deploy frontend to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --detach --service frontend
