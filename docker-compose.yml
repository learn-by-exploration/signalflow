services:
  # ── PostgreSQL + TimescaleDB ──
  db:
    image: timescale/timescaledb:2.14.2-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-signalflow}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7.2-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-signalflow_redis_dev} --appendonly yes --appendfsync everysec --save ""
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-signalflow_redis_dev}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    user: root  # Dev: volume mount requires root; production Dockerfile uses appuser
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?err}@db:5432/${POSTGRES_DB:-signalflow}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?err}@db:5432/${POSTGRES_DB:-signalflow}
      REDIS_URL: redis://:${REDIS_PASSWORD:-signalflow_redis_dev}@redis:6379/0
      API_SECRET_KEY: ${API_SECRET_KEY:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      bash -c "alembic upgrade head &&
               uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # ── Celery Worker + Beat ──
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    user: root  # Dev: volume mount requires root; production Dockerfile uses appuser
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?err}@db:5432/${POSTGRES_DB:-signalflow}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?err}@db:5432/${POSTGRES_DB:-signalflow}
      REDIS_URL: redis://:${REDIS_PASSWORD:-signalflow_redis_dev}@redis:6379/0
      API_SECRET_KEY: ${API_SECRET_KEY:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      celery -A app.tasks.celery_app worker --beat --loglevel=info

  # ── Flower (Celery Monitoring) ──
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-signalflow_redis_dev}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-signalflow_redis_dev}@redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "5555:5555"
    command: >
      celery -A app.tasks.celery_app flower
      --port=5555
      --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-signalflow_flower_dev}

  # ── Next.js Frontend ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_WS_URL: ws://localhost:8000
        NEXT_PUBLIC_SHOW_DEMO: "true"
        NEXT_PUBLIC_API_KEY: ${API_SECRET_KEY:-}
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
      NEXT_PUBLIC_SHOW_DEMO: "true"
      NEXT_PUBLIC_API_KEY: ${API_SECRET_KEY:-}
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET required}
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
